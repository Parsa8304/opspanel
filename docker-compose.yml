name: opspanel

# Local development stack. Host ports are overridable so this never collides
# with another stack on the same machine — set them in .env, e.g.
#   PG_PORT=5544  REDIS_PORT=6390  APP_PORT=3004
# (Run `docker compose -p myname up` to namespace the project differently.)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: panel
      POSTGRES_DB: panel
    ports:
      - "${PG_PORT:-5544}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6390}:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: opspanel-app:dev
    restart: unless-stopped
    pid: "host"
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://panel:panel@postgres:5432/panel?schema=public
      REDIS_URL: redis://redis:6379
      # No defaults: the app fails closed if these are unset. Provide them via a
      # local .env (gitignored) or your secret manager. Generate with e.g.
      #   openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>=32 chars)}
      PANEL_MASTER_KEY: ${PANEL_MASTER_KEY:?PANEL_MASTER_KEY is required (>=16 chars)}
      DOCKER_SOCKET: /var/run/docker.sock
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-OpsPanel}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_PORT:-3004}:3000"

volumes:
  pgdata:
