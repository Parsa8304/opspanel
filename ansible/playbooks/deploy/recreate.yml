---
# Section 16 — Recreate deploy play (HAS downtime — only for non-critical
# services where a brief blip is acceptable). Stops blue, starts green.
# The panel still refuses stateful services and still records the deploy.
#
# Extravars: repo_path, commit_sha, service, green_name, green_port,
#   blue_name, container_port, image_tag, health_path, health_consecutive,
#   health_interval_ms.
- name: Recreate deploy {{ service }} @ {{ commit_sha }}
  hosts: all
  gather_facts: false
  tasks:
    - name: Build new image
      ansible.builtin.command:
        cmd: docker compose -f {{ repo_path }}/docker-compose.yml build {{ service }}
      changed_when: true

    - name: Stop old container
      ansible.builtin.command:
        cmd: docker stop {{ blue_name }}
      changed_when: true
      ignore_errors: true

    - name: Start new container
      ansible.builtin.command:
        cmd: >-
          docker run -d --name {{ green_name }}
          -p {{ green_port }}:{{ container_port | default(8000) }}
          {{ image_tag }}
      changed_when: true

    - name: Health-check new container
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ green_port }}{{ health_path | default('/health') }}"
        status_code: 200
      register: hc
      retries: "{{ (health_consecutive | int) * 3 }}"
      delay: "{{ (health_interval_ms | int) / 1000 }}"
      until: hc.status == 200
