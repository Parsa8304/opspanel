name: devops-panel

services:
  db:
    image: postgres:16-alpine
    container_name: devops-panel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: ${PANEL_PG_PASSWORD}
      POSTGRES_DB: panel
    volumes:
      - dp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [dpnet]

  redis:
    image: redis:7-alpine
    container_name: devops-panel-redis
    restart: unless-stopped
    networks: [dpnet]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops-panel-app:latest
    container_name: devops-panel-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://panel:${PANEL_PG_PASSWORD}@db:5432/panel?schema=public
      # Async-pipeline monitoring observes the Market Navigator Celery broker.
      REDIS_URL: redis://mn2-redis:6379
      JWT_SECRET: ${PANEL_JWT_SECRET}
      PANEL_MASTER_KEY: ${PANEL_MASTER_KEY}
      DOCKER_SOCKET: /var/run/docker.sock
      PANEL_LOCAL_HOST: vps
    # Mount the host Docker socket so Container Monitoring works (read via
    # dockerode; all mutating actions require an authenticated ENGINEER+ login).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-only view of the product repo for Git/Version, Code Benchmarks,
      # Discovery (panel can read it; it can never modify the product).
      - /opt/marketnavigator:/srv/marketnavigator:ro
    networks: [dpnet, mnnet]

  nginx:
    image: nginx:alpine
    container_name: devops-panel-nginx
    restart: unless-stopped
    depends_on: [app]
    # Host-isolated: alternate ports, never touches the existing mn2-nginx.
    ports:
      - "8088:80"
      - "8443:443"
    volumes:
      - ./nginx/devops.conf:/etc/nginx/conf.d/default.conf:ro
      - dp_certs:/etc/nginx/certs
    entrypoint: ["/bin/sh", "-c", "if [ ! -f /etc/nginx/certs/self.crt ]; then apk add --no-cache openssl >/dev/null && openssl req -x509 -nodes -newkey rsa:2048 -days 825 -keyout /etc/nginx/certs/self.key -out /etc/nginx/certs/self.crt -subj '/CN=devops.karefun.ai'; fi; exec nginx -g 'daemon off;'"]
    networks: [dpnet]

volumes:
  dp_pgdata:
  dp_certs:

networks:
  dpnet:
    name: devops-panel-net
  # Pre-existing Market Navigator network — joined read-only so the panel can
  # observe mn2-redis / mn2-postgres / mn2-backend etc. Not created/modified here.
  mnnet:
    external: true
    name: marketnavigator_default
