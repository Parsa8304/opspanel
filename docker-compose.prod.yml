name: opspanel

# Production stack for OpsPanel. Copy .env.example to .env and fill in the
# required secrets first — the app fails closed without them.
#   PANEL_PG_PASSWORD, PANEL_JWT_SECRET (>=32), PANEL_MASTER_KEY (>=16)
# Generate secrets with: openssl rand -hex 32

services:
  db:
    image: postgres:16-alpine
    container_name: opspanel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: ${PANEL_PG_PASSWORD:?set PANEL_PG_PASSWORD}
      POSTGRES_DB: panel
    volumes:
      - dp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [dpnet]

  redis:
    image: redis:7-alpine
    container_name: opspanel-redis
    restart: unless-stopped
    networks: [dpnet]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: opspanel-app:latest
    container_name: opspanel-app
    restart: unless-stopped
    # The panel runs host-level operations (port scans, SSH config, infra
    # deploys) via `nsenter` into the host namespaces — this needs pid:host and
    # privileged. It therefore requires a real VPS where you control the host;
    # it will NOT run on managed PaaS that forbids privileged containers.
    # See SECURITY.md for how to reduce this surface (socket-proxy, dropped caps).
    pid: "host"
    privileged: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://panel:${PANEL_PG_PASSWORD}@db:5432/panel?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${PANEL_JWT_SECRET:?set PANEL_JWT_SECRET (>=32 chars)}
      PANEL_MASTER_KEY: ${PANEL_MASTER_KEY:?set PANEL_MASTER_KEY (>=16 chars)}
      DOCKER_SOCKET: /var/run/docker.sock
      PANEL_LOCAL_HOST: ${PANEL_LOCAL_HOST:-local}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-OpsPanel}
      # Directory the panel deploys/reads on the host (Infra Deploy, Discovery,
      # Code Benchmarks). Point this at your app's compose project.
      INFRA_DEPLOY_DIR: ${INFRA_DEPLOY_DIR:-/opt/app}
    # Host Docker socket: Container Monitoring reads it; all mutating actions
    # require an authenticated ENGINEER+ login.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: read-only view of the app repo you deploy, for Git/Discovery.
      # - ${INFRA_DEPLOY_DIR:-/opt/app}:${INFRA_DEPLOY_DIR:-/opt/app}:ro
    networks: [dpnet]

  nginx:
    image: nginx:alpine
    container_name: opspanel-nginx
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "8088:80"
      - "8443:443"
    volumes:
      - ./nginx/devops.conf:/etc/nginx/conf.d/default.conf:ro
      - dp_certs:/etc/nginx/certs
    # Generates a self-signed cert on first boot. For production, replace with a
    # real cert (Let's Encrypt) and update server_name in nginx/devops.conf.
    entrypoint: ["/bin/sh", "-c", "if [ ! -f /etc/nginx/certs/self.crt ]; then apk add --no-cache openssl >/dev/null && openssl req -x509 -nodes -newkey rsa:2048 -days 825 -keyout /etc/nginx/certs/self.key -out /etc/nginx/certs/self.crt -subj '/CN=panel.example.com'; fi; exec nginx -g 'daemon off;'"]
    networks: [dpnet]

volumes:
  dp_pgdata:
  dp_certs:

networks:
  dpnet:
    name: opspanel-net
