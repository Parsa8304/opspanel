<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpsPanel — self-hosted DevOps control panel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0f1424"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.18" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glow1)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M200 0 V320 M400 0 V320 M600 0 V320 M800 0 V320 M1000 0 V320"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(96 110)">
    <rect width="100" height="100" rx="24" fill="url(#accent)"/>
    <g stroke="#0a0e1a" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M30 38 L48 50 L30 62"/>
      <path d="M56 64 H72"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="232" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Arial" font-size="68" font-weight="800" fill="#eef1ff">Ops<tspan fill="url(#accent)">Panel</tspan></text>
  <text x="234" y="196" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Arial" font-size="25" font-weight="500" fill="#b4bce0">Self-hosted DevOps control panel for your server</text>

  <!-- feature chips -->
  <g font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Arial" font-size="17" font-weight="600">
    <g transform="translate(234 224)">
      <rect width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.4"/>
      <text x="75" y="26" text-anchor="middle" fill="#c7cdf0">Containers</text>
    </g>
    <g transform="translate(398 224)">
      <rect width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.4"/>
      <text x="75" y="26" text-anchor="middle" fill="#c7cdf0">Deployments</text>
    </g>
    <g transform="translate(562 224)">
      <rect width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="60" y="26" text-anchor="middle" fill="#c7cdf0">Servers</text>
    </g>
    <g transform="translate(696 224)">
      <rect width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="75" y="26" text-anchor="middle" fill="#c7cdf0">Port&#160;Map</text>
    </g>
    <g transform="translate(860 224)">
      <rect width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="60" y="26" text-anchor="middle" fill="#c7cdf0">Alerts</text>
    </g>
  </g>
</svg>
